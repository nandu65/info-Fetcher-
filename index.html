<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Tool</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 500px;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}
textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}
.result {
    margin-top: 15px;
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
    <h3>Multi Search Tool</h3>

    <textarea id="queryInput" placeholder="Enter queries (one per line)"></textarea>

    <button onclick="search()">Search</button>

    <div class="result" id="resultBox">Results will appear here...</div>
</div>

<script>
async function search() {
    const queries = document.getElementById("queryInput").value;
    const resultBox = document.getElementById("resultBox");

    if (!queries.trim()) {
        resultBox.innerText = "Enter something!";
        return;
    }

    resultBox.innerText = "Loading...";

    try {
        const response = await fetch("http://127.0.0.1:5000/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                queries: queries.split("\n")
            })
        });

        const data = await response.json();
        resultBox.innerText = JSON.stringify(data, null, 2);

    } catch (err) {
        resultBox.innerText = "Error connecting to backend";
    }
}
</script>

</body>
</html>
